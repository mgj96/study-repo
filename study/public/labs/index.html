<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>실험실 (Labs) — 직접 돌려보는 개념</title>
<style>
  :root{
    --bg:#eceff3; --surface:#ffffff; --ink:#16202b; --muted:#5c6b7a;
    --line:#d6dde4; --accent:#d16a4a; --accent-soft:#f2d9d0;
    --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,monospace;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;
  }
  @media (prefers-color-scheme:dark){
    :root{--bg:#0c1218;--surface:#131c25;--ink:#e6edf3;--muted:#8a99a7;
      --line:#233039;--accent:#e8956f;--accent-soft:#33231c;}
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.55}
  .wrap{max-width:840px;margin:0 auto;padding:clamp(24px,5vw,52px) clamp(16px,4vw,28px) 72px}
  .kicker{font-family:var(--mono);font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);font-weight:600}
  h1{font-family:var(--mono);font-weight:700;font-size:clamp(28px,6vw,42px);letter-spacing:-.01em;margin:.3em 0 .2em}
  .lede{color:var(--muted);max-width:60ch;font-size:15.5px;margin:0 0 34px}
  .lede a{color:var(--accent);text-decoration:none}
  .grid{display:grid;grid-template-columns:1fr;gap:16px}
  @media(min-width:620px){.grid{grid-template-columns:1fr 1fr}}
  .card{display:block;text-decoration:none;color:inherit;background:var(--surface);
    border:1px solid var(--line);border-radius:12px;padding:20px;transition:border-color .15s,transform .15s}
  .card:hover{border-color:var(--accent);transform:translateY(-2px)}
  .card:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  .card .emoji{font-size:26px}
  .card h2{font-family:var(--mono);font-size:17px;margin:10px 0 6px;letter-spacing:-.01em}
  .card p{color:var(--muted);font-size:13.5px;margin:0}
  .tag{display:inline-block;font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;
    text-transform:uppercase;color:var(--accent);border:1px solid var(--accent-soft);
    border-radius:20px;padding:2px 8px;margin-top:12px}
  .soon{opacity:.55;pointer-events:none}
  .foot{margin-top:40px;padding-top:20px;border-top:1px solid var(--line);
    color:var(--muted);font-family:var(--mono);font-size:12px}
  .foot a{color:var(--accent);text-decoration:none}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
  <div class="wrap">
    <div class="kicker">Labs · 실험 도메인</div>
    <h1>🧪 실험실</h1>
    <p class="lede">공부 노트가 "정리"라면, 여기는 <strong>직접 돌려보는 곳</strong>이에요. 개념을 브라우저에서
      실제로 실행·측정·시각화합니다. 노트로 돌아가려면 <a href="https://mgj96.github.io/study-repo/">study-repo</a>.</p>

    <div class="grid">
      <a class="card" href="cs-playground.html">
        <div class="emoji">⚙️</div>
        <h2>CS 실험실</h2>
        <p>부동소수(IEEE 754)·Big-O 타이밍·해시 충돌·경쟁상태를 실제로 실행.</p>
        <span class="tag">실측 + 시뮬</span>
      </a>
      <div class="card soon">
        <div class="emoji">➕</div>
        <h2>다음 실험</h2>
        <p>캐시 지역성·B+트리 시각화·정렬 애니메이션 등 — 추가 예정.</p>
        <span class="tag">준비 중</span>
      </div>
    </div>

    <div class="foot">
      독립 실험 도메인(bounded context) · 나중에 별도 레포로 분리 가능 ·
      경로: <code>study/public/labs/</code>
    </div>
  </div>
</body>
</html>
